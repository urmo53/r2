<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>R2</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --text: #ffffff;
      --text-soft: rgba(255,255,255,0.72);
      --accent: #58a6ff;
      --shadow-strong: rgba(0,0,0,0.42);
      --shadow-soft: rgba(0,0,0,0.22);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      font-family:
        "SF Pro Display",
        "SF Pro Text",
        -apple-system,
        BlinkMacSystemFont,
        "Helvetica Neue",
        Inter,
        "Segoe UI",
        Arial,
        sans-serif;
      color: var(--text);
      background: #000;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    .wallpaper {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: #000;
    }

    .wallpaper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(34px) brightness(0.78) saturate(1.08);
      transform: scale(1.1);
    }

    .wallpaper::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          90deg,
          rgba(255,255,255,0.02) 0%,
          rgba(0,0,0,0.08) 38%,
          rgba(0,0,0,0.18) 100%
        );
    }

    .app {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 880px;
      max-width: 880px;
      display: grid;
      grid-template-columns: 400px 400px;
      gap: 80px;
      align-items: center;
      justify-content: center;
    }

    .art-wrap {
      width: 400px;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .art {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.46);
      background: rgba(255,255,255,0.06);
    }

    .text {
      width: 400px;
      height: 400px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding-top: 10%;
      padding-bottom: 10%;
      align-items: flex-start;
    }

    .top-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-start;
      width: 100%;
    }

    .r2 {
      font-size: 70px;
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 0.92;
      color: var(--text);
      text-shadow:
        0 3px 18px var(--shadow-strong),
        0 1px 2px var(--shadow-soft);
    }

    .track-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      max-width: 400px;
    }

    .artist {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-soft);
      text-shadow:
        0 3px 18px var(--shadow-strong),
        0 1px 2px var(--shadow-soft);
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text);
      text-shadow:
        0 3px 18px var(--shadow-strong),
        0 1px 2px var(--shadow-soft);
      overflow-wrap: anywhere;
    }

    .bottom-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      width: 100%;
    }

    .live-button {
      appearance: none;
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
    }

    .live-button:focus-visible {
      outline: 3px solid rgba(255,255,255,0.72);
      outline-offset: 6px;
      border-radius: 8px;
    }

    .live-label {
      font-size: 21px;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      text-shadow:
        0 3px 18px var(--shadow-strong),
        0 1px 2px var(--shadow-soft);
    }

    .live-waves {
      display: flex;
      gap: 6px;
      align-items: center;
      height: 24px;
    }

    .live-waves span {
      display: inline-block;
      width: 4.5px;
      border-radius: 999px;
      background: var(--accent);
      animation: liveWave 1s infinite ease-in-out;
      box-shadow: 0 0 8px rgba(88, 166, 255, 0.35);
      transform-origin: bottom center;
    }

    .live-waves span:nth-child(1) { height: 9px; animation-delay: 0s; }
    .live-waves span:nth-child(2) { height: 18px; animation-delay: 0.15s; }
    .live-waves span:nth-child(3) { height: 12px; animation-delay: 0.3s; }
    .live-waves span:nth-child(4) { height: 21px; animation-delay: 0.45s; }
    .live-waves span:nth-child(5) { height: 14px; animation-delay: 0.6s; }

    @keyframes liveWave {
      0%, 100% { transform: scaleY(0.6); opacity: 0.6; }
      50% { transform: scaleY(1.4); opacity: 1; }
    }

    .listeners {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-soft);
      text-shadow:
        0 3px 18px var(--shadow-strong),
        0 1px 2px var(--shadow-soft);
      opacity: 0.95;
    }

    .listeners-label {
      color: var(--text-soft);
      font-weight: 500;
    }

    .listeners-count {
      min-width: 2ch;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .listeners-trend {
      min-width: 1ch;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
    }

    audio {
      display: none;
    }

    @media (max-width: 600px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
        padding: 30px 20px;
      }

      .container {
        width: 100%;
        max-width: 400px;
        grid-template-columns: 1fr;
        gap: 40px;
        text-align: center;
      }

      .art-wrap,
      .text {
        width: 100%;
        height: auto;
      }

      .text,
      .top-block,
      .bottom-block,
      .track-meta {
        align-items: center;
      }

      .title {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="wallpaper">
    <img id="bg" src="/images/r2.png" alt="">
  </div>

  <div class="app">
    <div class="container">
      <div class="art-wrap">
        <img id="art" class="art" src="/images/r2.png" alt="R2 artwork">
      </div>

      <div class="text">
        <div class="top-block">
          <div class="r2">R2</div>

          <div class="track-meta">
            <div id="artist" class="artist">Raadio 2</div>
            <div id="title" class="title">Laadimine...</div>
          </div>
        </div>

        <div class="bottom-block">
          <button id="liveBtn" class="live-button" type="button" aria-label="Käivita või peata striim">
            <span class="live-label">LIVE</span>
            <span class="live-waves" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </span>
          </button>

          <div class="listeners">
            <span class="listeners-label">Kuulajaid:</span>
            <span id="listeners" class="listeners-count">–</span>
            <span id="trend" class="listeners-trend">→</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <audio id="audio" playsinline></audio>

  <script>
    const audio = document.getElementById("audio");
    const liveBtn = document.getElementById("liveBtn");
    const artEl = document.getElementById("art");
    const bgEl = document.getElementById("bg");
    const artistEl = document.getElementById("artist");
    const titleEl = document.getElementById("title");
    const listenersEl = document.getElementById("listeners");
    const trendEl = document.getElementById("trend");

    let lastListeners = null;

    liveBtn.addEventListener("click", async () => {
      try {
        if (!audio.src) {
          audio.src = "https://icecast.err.ee/raadio2.mp3";
        }

        if (audio.paused) {
          await audio.play();
        } else {
          audio.pause();
        }
      } catch (e) {
        console.log("live button error", e);
      }
    });

    function parseTrack(data) {
      const rawArtist = data.artist || "";
      const rawTitle = data.title || "";

      if (rawArtist && rawTitle) {
        return { artist: rawArtist, title: rawTitle };
      }

      if (rawTitle.includes(" - ")) {
        const parts = rawTitle.split(" - ");
        return {
          artist: parts.shift().trim() || "Raadio 2",
          title: parts.join(" - ").trim() || "R2"
        };
      }

      return {
        artist: "Raadio 2",
        title: rawTitle || "R2"
      };
    }

    function updateListeners(nextValue) {
      const next = Number(nextValue || 0);

      if (lastListeners === null) {
        listenersEl.textContent = next;
        trendEl.textContent = "→";
        lastListeners = next;
        return;
      }

      if (next > lastListeners) trendEl.textContent = "↑";
      else if (next < lastListeners) trendEl.textContent = "↓";
      else trendEl.textContent = "→";

      listenersEl.textContent = next;
      lastListeners = next;
    }

    async function update() {
      try {
        const res = await fetch("/api/station", { cache: "no-store" });
        const data = await res.json();
        const track = parseTrack(data);

        artistEl.textContent = track.artist;
        titleEl.textContent = track.title;

        if (data.artwork) {
          artEl.src = data.artwork;
          bgEl.src = data.artwork;
        }

        updateListeners(data.listeners);
      } catch (e) {
        console.log("update error", e);
      }
    }

    update();
    setInterval(update, 5000);
  </script>
</body>
</html>
