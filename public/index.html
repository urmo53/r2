<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>R2</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --text: #ffffff;
      --text-soft: rgba(255,255,255,0.72);
      --accent: #58a6ff;
      --shadow-strong: rgba(0,0,0,0.42);
      --shadow-soft: rgba(0,0,0,0.22);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
    }

    body {
      font-family:
        "SF Pro Display",
        "SF Pro Text",
        -apple-system,
        BlinkMacSystemFont,
        "Helvetica Neue",
        Inter,
        "Segoe UI",
        Arial,
        sans-serif;
      color: var(--text);
      background: #000;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    .wallpaper {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: #000;
    }

    .wallpaper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(39px) brightness(0.78) saturate(1.08) contrast(1.05);
      transform: scale(1.1);
      transition: opacity 300ms ease;
    }

    .wallpaper::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          90deg,
          rgba(255,255,255,0.02) 0%,
          rgba(0,0,0,0.08) 38%,
          rgba(0,0,0,0.18) 100%
        );
    }

    .app {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 960px;
      max-width: 960px;
      display: grid;
      grid-template-columns: 440px 440px;
      gap: 80px;
      align-items: center;
      justify-content: center;
    }

    .art-wrap {
      width: 440px;
      height: 440px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .art {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.46);
      background: rgba(255,255,255,0.06);
      transition: opacity 300ms ease;
    }

    .text {
      width: 440px;
      height: 440px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding-top: 10%;
      padding-bottom: 10%;
      align-items: flex-start;
    }

    .top-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-start;
      width: 100%;
    }

    .r2 {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 0.92;
      color: var(--text);
      text-shadow:
        0 3px 18px var(--shadow-strong),
        0 1px 2px var(--shadow-soft);
    }

    .track-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      max-width: 440px;
    }

    .artist {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-soft);
      text-shadow:
        0 3px 18px var(--shadow-strong),
        0 1px 2px var(--shadow-soft);
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text);
      text-shadow:
        0 3px 18px var(--shadow-strong),
        0 1px 2px var(--shadow-soft);
      overflow-wrap: anywhere;
    }

    .bottom-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
      width: 100%;
    }

    .live-button {
      appearance: none;
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
    }

    .live-button:focus-visible {
      outline: 3px solid rgba(255,255,255,0.72);
      outline-offset: 6px;
      border-radius: 8px;
    }

    .live-label {
      font-size: 21px;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
      text-shadow:
        0 3px 18px var(--shadow-strong),
        0 1px 2px var(--shadow-soft);
      transition: color 180ms ease, opacity 180ms ease;
    }

    .live-button.paused .live-label {
      opacity: 0.72;
    }

    .live-waves {
      display: flex;
      gap: 6px;
      align-items: center;
      height: 24px;
    }

    .live-waves span {
      display: inline-block;
      width: 4.5px;
      border-radius: 999px;
      background: var(--accent);
      animation: liveWave 1s infinite ease-in-out;
      box-shadow: 0 0 8px color-mix(in srgb, var(--accent) 40%, transparent);
      transform-origin: bottom center;
      transition: background-color 180ms ease, opacity 180ms ease;
    }

    .live-waves span:nth-child(1) { height: 9px;  animation-delay: 0s; }
    .live-waves span:nth-child(2) { height: 18px; animation-delay: 0.15s; }
    .live-waves span:nth-child(3) { height: 12px; animation-delay: 0.3s; }
    .live-waves span:nth-child(4) { height: 21px; animation-delay: 0.45s; }
    .live-waves span:nth-child(5) { height: 14px; animation-delay: 0.6s; }

    .live-button.paused .live-waves span {
      opacity: 0.55;
    }

    @keyframes liveWave {
      0%, 100% { transform: scaleY(0.6); opacity: 0.6; }
      50% { transform: scaleY(1.4); opacity: 1; }
    }

    .listeners-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 4px;
    }

    .listeners-icons {
      display: inline-flex;
      align-items: center;
      gap: 0px;
      min-width: 24px;
      max-width: 220px;
      overflow: hidden;
    }

    .listeners-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-soft);
      opacity: 0.95;
      flex: 0 0 auto;
      line-height: 1;
      text-shadow:
        0 3px 18px var(--shadow-strong),
        0 1px 2px var(--shadow-soft);
    }

    .clean-user-icon {
      position: relative;
      width: 14px;
      height: 14px;
	margin-left: -6px; /* <-- see teeb overlap efekti */
}

.clean-user-icon:first-child {
  margin-left: 0;
    }

    .clean-user-icon svg {
      display: block;
      width: 14px;
      height: 14px;
      overflow: visible;
    }

    .clean-user-icon.is-half {
      opacity: 0.45;
    }

    .clean-user-icon.is-full {
      opacity: 1;
    }

    .listeners-count {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      min-width: 3ch;
      font-variant-numeric: tabular-nums;
      text-shadow:
        0 3px 18px var(--shadow-strong),
        0 1px 2px var(--shadow-soft);
    }

    .listeners-trend {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
      min-width: 1ch;
      text-shadow:
        0 3px 18px var(--shadow-strong),
        0 1px 2px var(--shadow-soft);
    }

    .listeners-chart {
      width: 180px;
      height: 42px;
      overflow: visible;
    }

    .listeners-baseline {
      fill: none;
      stroke: rgba(255,255,255,0.14);
      stroke-width: 1;
    }

    .listeners-line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    audio {
      display: none;
    }

    @media (max-width: 700px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
        padding: 30px 20px;
      }

      .container {
        width: 100%;
        max-width: 440px;
        grid-template-columns: 1fr;
        gap: 40px;
        text-align: center;
      }

      .art-wrap,
      .text {
        width: 100%;
        height: auto;
      }

      .text,
      .top-block,
      .bottom-block,
      .track-meta {
        align-items: center;
      }

      .listeners-row {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <div class="wallpaper">
    <img id="bg" src="/images/r2.png" alt="">
  </div>

  <div class="app">
    <div class="container">
      <div class="art-wrap">
        <img id="art" class="art" src="/images/r2.png" alt="R2 artwork" crossorigin="anonymous">
      </div>

      <div class="text">
        <div class="top-block">
          <div class="r2">R2</div>

          <div class="track-meta">
            <div id="artist" class="artist">Raadio 2</div>
            <div id="title" class="title">Laadimine...</div>
          </div>
        </div>

        <div class="bottom-block">
          <button id="liveBtn" class="live-button paused" type="button" aria-label="Käivita või peata striim">
            <span class="live-label">LIVE</span>
            <span class="live-waves" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
            </span>
          </button>

          <div class="listeners-row">
            <span id="listenersIcons" class="listeners-icons" aria-label="Kuulajate ikoonid"></span>

            <span id="listenersCount" class="listeners-count">–</span>
            <span id="listenersTrend" class="listeners-trend">→</span>

            <svg class="listeners-chart" viewBox="0 0 180 42" aria-hidden="true">
              <path class="listeners-baseline" d="M 0 36 L 180 36"></path>
              <path id="listenersPath" class="listeners-line" d=""></path>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>

  <audio id="audio" playsinline></audio>

  <script>
    const FALLBACK = "/images/r2.png";
    const audio = document.getElementById("audio");
    const liveBtn = document.getElementById("liveBtn");
    const artEl = document.getElementById("art");
    const bgEl = document.getElementById("bg");
    const artistEl = document.getElementById("artist");
    const titleEl = document.getElementById("title");
    const listenersIconsEl = document.getElementById("listenersIcons");
    const listenersCountEl = document.getElementById("listenersCount");
    const listenersTrendEl = document.getElementById("listenersTrend");
    const listenersPathEl = document.getElementById("listenersPath");

    let currentArtwork = null;

    function setTheme({ text, textSoft, accent, shadowStrong, shadowSoft }) {
      const root = document.documentElement;
      root.style.setProperty("--text", text);
      root.style.setProperty("--text-soft", textSoft);
      root.style.setProperty("--accent", accent);
      root.style.setProperty("--shadow-strong", shadowStrong);
      root.style.setProperty("--shadow-soft", shadowSoft);
    }

    function applyNewsTheme() {
      setTheme({
        text: "#ffffff",
        textSoft: "rgba(255,255,255,0.78)",
        accent: "#ff3b30",
        shadowStrong: "rgba(0,0,0,0.46)",
        shadowSoft: "rgba(0,0,0,0.22)"
      });
    }

    function pickTheme(r, g, b) {
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      const isLight = luminance > 0.68;

      if (isLight) {
        return {
          text: "#111111",
          textSoft: "rgba(17,17,17,0.76)",
          accent: "#111111",
          shadowStrong: "rgba(255,255,255,0.16)",
          shadowSoft: "rgba(255,255,255,0.08)"
        };
      }

      const max = Math.max(r, g, b);

      if (max === r) {
        return {
          text: "#ffffff",
          textSoft: "rgba(255,255,255,0.72)",
          accent: "#ff5a6b",
          shadowStrong: "rgba(0,0,0,0.46)",
          shadowSoft: "rgba(0,0,0,0.22)"
        };
      }

      if (max === g) {
        return {
          text: "#ffffff",
          textSoft: "rgba(255,255,255,0.72)",
          accent: "#42d66f",
          shadowStrong: "rgba(0,0,0,0.46)",
          shadowSoft: "rgba(0,0,0,0.22)"
        };
      }

      return {
        text: "#ffffff",
        textSoft: "rgba(255,255,255,0.72)",
        accent: "#58a6ff",
        shadowStrong: "rgba(0,0,0,0.46)",
        shadowSoft: "rgba(0,0,0,0.22)"
      };
    }

    async function preloadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function applyThemeFromImage(img) {
      try {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        const w = 24;
        const h = 24;

        canvas.width = w;
        canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);

        const { data } = ctx.getImageData(0, 0, w, h);
        let r = 0, g = 0, b = 0, count = 0;

        for (let i = 0; i < data.length; i += 4) {
          const alpha = data[i + 3];
          if (alpha < 120) continue;
          r += data[i];
          g += data[i + 1];
          b += data[i + 2];
          count++;
        }

        if (!count) throw new Error("No readable pixels");

        setTheme(pickTheme(
          Math.round(r / count),
          Math.round(g / count),
          Math.round(b / count)
        ));
      } catch {
        setTheme({
          text: "#ffffff",
          textSoft: "rgba(255,255,255,0.72)",
          accent: "#58a6ff",
          shadowStrong: "rgba(0,0,0,0.46)",
          shadowSoft: "rgba(0,0,0,0.22)"
        });
      }
    }

    async function updateArtwork(artwork) {
      const src = artwork || FALLBACK;
      if (src === currentArtwork) return;
      currentArtwork = src;

      artEl.src = src;
      bgEl.src = src;

      try {
        const img = await preloadImage(src);
        applyThemeFromImage(img);
      } catch {
        setTheme({
          text: "#ffffff",
          textSoft: "rgba(255,255,255,0.72)",
          accent: "#58a6ff",
          shadowStrong: "rgba(0,0,0,0.46)",
          shadowSoft: "rgba(0,0,0,0.22)"
        });
      }
    }

    function buildLinePath(values, width, height, padding = 4) {
      if (!Array.isArray(values) || values.length < 2) return "";

      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = Math.max(max - min, 1);

      return values.map((v, i) => {
        const x = (i / (values.length - 1)) * width;
        const y = height - padding - ((v - min) / range) * (height - padding * 2);
        return `${i === 0 ? "M" : "L"} ${x.toFixed(1)} ${y.toFixed(1)}`;
      }).join(" ");
    }

    function parseTrack(data) {
      const rawArtist = data.artist || "";
      const rawTitle = data.title || "";

      if (rawArtist && rawTitle) {
        return { artist: rawArtist, title: rawTitle };
      }

      if (rawTitle.includes(" - ")) {
        const parts = rawTitle.split(" - ");
        return {
          artist: parts.shift().trim() || "Raadio 2",
          title: parts.join(" - ").trim() || "R2"
        };
      }

      return {
        artist: "Raadio 2",
        title: rawTitle || "R2"
      };
    }

    function listenerIconMarkup(state) {
      return `
        <span class="listeners-icon clean-user-icon ${state}" aria-hidden="true">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="10" cy="6.2" r="2.6" fill="currentColor"/>
            <path d="M4.5 15.5c0-2.6 2.3-4.3 5.5-4.3s5.5 1.7 5.5 4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </span>
      `;
    }

    function renderListenerIcons(listeners) {
      const value = Math.max(0, Number(listeners || 0));
      const capped = Math.min(value, 1000);

      let fullIcons = Math.floor(capped / 100);
      let halfIcons = 0;
      const remainder = capped % 100;

      if (remainder >= 1 && remainder <= 50) {
        halfIcons = 1;
      } else if (remainder >= 51) {
        fullIcons += 1;
      }

      fullIcons = Math.min(10, fullIcons);
      if (fullIcons >= 10) {
        halfIcons = 0;
      }

      let html = "";

      for (let i = 0; i < fullIcons; i++) {
        html += listenerIconMarkup("is-full");
      }

      for (let i = 0; i < halfIcons; i++) {
        html += listenerIconMarkup("is-half");
      }

      if (!html) {
        html = listenerIconMarkup("is-half");
      }

      listenersIconsEl.innerHTML = html;
    }

    function updateListeners(data) {
      const next = Number(data.listeners || 0);
      listenersCountEl.textContent = next;

      renderListenerIcons(next);

      const trend = data.listenersTrend1m || "flat";
      if (trend === "up") {
        listenersTrendEl.textContent = "↑";
      } else if (trend === "down") {
        listenersTrendEl.textContent = "↓";
      } else {
        listenersTrendEl.textContent = "→";
      }

      const history = Array.isArray(data.listenersHistory) ? data.listenersHistory : [];
      listenersPathEl.setAttribute("d", buildLinePath(history, 180, 42));
    }

    function updateLiveState() {
      liveBtn.classList.toggle("paused", audio.paused);
    }

    liveBtn.addEventListener("click", async () => {
      try {
        if (!audio.src) {
          audio.src = "https://icecast.err.ee/raadio2.mp3";
        }

        if (audio.paused) {
          await audio.play();
        } else {
          audio.pause();
        }

        updateLiveState();
      } catch (e) {
        console.log("live button error", e);
      }
    });

    audio.addEventListener("play", updateLiveState);
    audio.addEventListener("pause", updateLiveState);

    async function update() {
      try {
        const res = await fetch("/api/station", {
          cache: "no-store",
          headers: {
            "Cache-Control": "no-cache"
          }
        });

        const data = await res.json();
        const track = parseTrack(data);

        artistEl.textContent = track.artist;
        titleEl.textContent = track.title;

        updateListeners(data);

        const isNews = track.title === "Uudised" || track.artist === "Uudised";
        const artworkToUse = isNews ? FALLBACK : (data.artwork || FALLBACK);

        await updateArtwork(artworkToUse);

        if (isNews) {
          applyNewsTheme();
        }
      } catch (e) {
        console.log("update error", e);
      }
    }

    updateLiveState();
    renderListenerIcons(0);
    update();
    setInterval(update, 5000);
  </script>
</body>
</html>
